<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Calculadora Financeira</title>
    <link rel="stylesheet" href="./calculadora_financeira.css">
</head>
<body>
    <h1> Calculadora Financeira </h1>
    <div class="calculadora_financeira" id="calculadora_financeira">
        <p>Qual é o objetivo financeiro (valor que deseja juntar)?</p>
        <input id="objetivo" type="number" class="campo" placeholder="R$ 0,00" step="0.01" min="0.01"><br>
        
        <p>Qual é o valor inicial da poupança?</p>
        <input id="valorInicial" type="number" class="campo" placeholder="R$ 0,00" step="0.01" min="0"><br>
        
        <p>Quanto o usuário pretende depositar mensalmente (valor fixo)?</p>
        <input id="depositoMensal" type="number" class="campo" placeholder="R$ 0,00" step="0.01" min="0.01"><br>
        
        <p>Qual é a taxa de juros mensal? (em %)</p>
        <input id="jurosMensal" type="number" class="campo" placeholder="Ex: 0.5" step="0.01" min="0.01"><br><br>

        <p>RESULTADO</p>
        <input id="total" type="text" readonly class="campo-resultado"><br><br>

        <div class="botoes">
            <input type="button" value="Calcular" id="calcular" onclick="calcularEconomia()">
            <input type="button" value="Limpar" id="limpar" onclick="limparTudo()">
        </div>
    </div>
    <script src="./calculadora_financeira.js"></script>
</body>
</html>
